<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReviewTime - 라이브 데모</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100vh; overflow: hidden;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(145deg, #0d0d1a 0%, #14142b 40%, #1a0d2e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Page header ── */
  .page-header {
    text-align: center;
    margin-bottom: 12px;
    flex-shrink: 0;
  }
  .page-header .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #FA0050;
    color: #fff;
    font-size: 0.5rem;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .page-header .badge::before {
    content: '';
    width: 6px; height: 6px;
    background: #fff;
    border-radius: 50%;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .page-header h1 {
    font-size: 1.1rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .page-header h1 span { color: #FA0050; }
  .page-header p { font-size: 0.55rem; color: rgba(255,255,255,.4); margin-top: 2px; }

  /* ── iPhone shell ── */
  .iphone-wrap {
    position: relative;
    flex-shrink: 0;
  }

  /* Left side buttons */
  .side-btn-left {
    position: absolute;
    left: -5px;
    top: 110px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 1;
  }
  .side-btn-left span {
    display: block;
    width: 4px;
    background: #2c2c2e;
    border-radius: 2px 0 0 2px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
  }
  .side-btn-left .btn-mute { height: 30px; top: -40px; }
  .side-btn-left .btn-vol-up { height: 40px; }
  .side-btn-left .btn-vol-down { height: 40px; }

  /* Right side button */
  .side-btn-right {
    position: absolute;
    right: -5px;
    top: 145px;
    z-index: 1;
  }
  .side-btn-right span {
    display: block;
    width: 4px;
    height: 70px;
    background: #2c2c2e;
    border-radius: 0 2px 2px 0;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
  }

  .iphone {
    position: relative;
    width: 340px;
    height: calc(100vh - 130px);
    max-height: 680px;
    min-height: 520px;
    background: linear-gradient(180deg, #1c1c1e 0%, #2c2c2e 100%);
    border-radius: 48px;
    padding: 10px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.12),
      0 0 0 3px #1c1c1e,
      0 0 0 4px rgba(255,255,255,.06),
      0 40px 80px rgba(0,0,0,.8),
      0 20px 40px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(255,255,255,.1);
  }

  /* Inner screen bezel */
  .iphone-screen {
    width: 100%;
    height: 100%;
    background: #fff;
    border-radius: 40px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
  }

  /* Dynamic Island */
  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 32px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    gap: 5px;
  }
  .dynamic-island .di-cam {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #1a1a1a;
    border: 1.5px solid #2a2a2a;
    position: relative;
  }
  .dynamic-island .di-cam::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #0d0d0d;
  }

  /* Status bar */
  .status-bar {
    height: 52px;
    background: #fff;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 26px 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 50;
  }
  .status-time {
    font-size: 0.72rem;
    font-weight: 700;
    color: #000;
    letter-spacing: -0.3px;
  }
  .status-icons {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .status-icons svg { display: block; }

  /* App content (iframe) */
  .app-content {
    flex: 1;
    position: relative;
    min-height: 0;
    overflow: hidden;
    background: #f5f5f5;
  }
  .demo-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Home indicator */
  .home-indicator {
    height: 26px;
    background: rgba(249,249,249,.94);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .home-indicator span {
    display: block;
    width: 110px; height: 4px;
    background: #000;
    border-radius: 3px;
    opacity: .18;
  }

  /* Loading overlay */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .loading-overlay.visible { opacity: 1; pointer-events: all; }
  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid #eee;
    border-top-color: #FA0050;
    border-radius: 50%;
    animation: spin .65s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { font-size: 0.55rem; color: #aaa; font-weight: 500; }

  /* Error overlay */
  .error-overlay {
    position: absolute;
    inset: 0;
    background: #fff;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 21;
    display: none;
    padding: 20px;
    text-align: center;
  }
  .error-overlay.visible { display: flex; }
  .error-overlay .err-icon { font-size: 2.2rem; margin-bottom: 4px; }
  .error-overlay h3 { font-size: 0.72rem; font-weight: 700; color: #1c1c1e; }
  .error-overlay p { font-size: 0.55rem; color: #8e8e93; line-height: 1.6; }
  .error-overlay code { font-size: 0.5rem; color: #FA0050; font-family: 'SF Mono', monospace; }
  .retry-btn {
    margin-top: 8px;
    padding: 8px 22px;
    background: #FA0050;
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 0.58rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: .3px;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="badge">Live Demo</div>
  <h1>ReviewTime <span>실시간 데모</span></h1>
  <p>실제 서비스 화면으로 살펴보는 AI 리뷰 분석</p>
</div>

<!-- iPhone mockup -->
<div class="iphone-wrap">

  <!-- Side buttons -->
  <div class="side-btn-left">
    <span class="btn-mute" style="height:28px; margin-bottom:5px;"></span>
    <span class="btn-vol-up" style="height:42px;"></span>
    <span class="btn-vol-down" style="height:42px;"></span>
  </div>
  <div class="side-btn-right">
    <span></span>
  </div>

  <div class="iphone">
    <div class="iphone-screen">

      <!-- Dynamic Island -->
      <div class="dynamic-island">
        <div class="di-cam"></div>
      </div>

      <!-- Status bar -->
      <div class="status-bar">
        <span class="status-time" id="statusTime">9:41</span>
        <div class="status-icons">
          <!-- Signal -->
          <svg width="17" height="12" viewBox="0 0 17 12">
            <rect x="0" y="8" width="3" height="4" rx="1" fill="#000"/>
            <rect x="4.5" y="5.5" width="3" height="6.5" rx="1" fill="#000"/>
            <rect x="9" y="3" width="3" height="9" rx="1" fill="#000"/>
            <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#000"/>
          </svg>
          <!-- WiFi -->
          <svg width="16" height="12" viewBox="0 0 16 12">
            <circle cx="8" cy="10.5" r="1.2" fill="#000"/>
            <path d="M5.2 8.2a3.8 3.8 0 0 1 5.6 0" stroke="#000" stroke-width="1.3" stroke-linecap="round" fill="none"/>
            <path d="M2.5 5.5A7.4 7.4 0 0 1 13.5 5.5" stroke="#000" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          </svg>
          <!-- Battery -->
          <svg width="26" height="12" viewBox="0 0 26 12">
            <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#000" stroke-opacity=".35"/>
            <rect x="2" y="2" width="17" height="8" rx="2" fill="#000"/>
            <path d="M23 4v4a2 2 0 0 0 0-4Z" fill="#000" opacity=".35"/>
          </svg>
        </div>
      </div>

      <!-- App content -->
      <div class="app-content">
        <div class="loading-overlay" id="loadingOverlay">
          <div class="spinner"></div>
          <p>로딩 중...</p>
        </div>
        <div class="error-overlay" id="errorOverlay">
          <div class="err-icon">🔌</div>
          <h3>서버 연결 실패</h3>
          <p>로컬 서버를 확인해 주세요<br>
          <code>python manage.py runserver</code></p>
          <button class="retry-btn" onclick="retryLoad()">다시 시도</button>
        </div>
        <iframe
          id="demoFrame"
          class="demo-frame"
          src="http://127.0.0.1:8000/"
          title="ReviewTime 라이브 데모"
          sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
          onload="onFrameLoad()"
          onerror="onFrameError()"
        ></iframe>
      </div>

      <!-- Home indicator -->
      <div class="home-indicator"><span></span></div>

    </div>
  </div>
</div>

<script>
  const BASE = 'http://127.0.0.1:8000';
  let loadTimer = null;

  // Live clock
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    document.getElementById('statusTime').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 15000);

  function navigate(path) {
    showLoading();
    document.getElementById('demoFrame').src = BASE + path;
    clearTimeout(loadTimer);
    loadTimer = setTimeout(() => { hideLoading(); showError(); }, 5000);
  }

  function onFrameLoad() {
    clearTimeout(loadTimer);
    hideLoading();
    hideError();
  }
  function onFrameError() {
    clearTimeout(loadTimer);
    hideLoading();
    showError();
  }

  function showLoading() {
    document.getElementById('loadingOverlay').classList.add('visible');
    document.getElementById('errorOverlay').classList.remove('visible');
  }
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('visible');
  }
  function showError() {
    document.getElementById('errorOverlay').classList.add('visible');
  }
  function hideError() {
    document.getElementById('errorOverlay').classList.remove('visible');
  }
  function retryLoad() {
    hideError();
    navigate('/');
  }

  showLoading();
</script>

</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="430" height="240" viewBox="0 0 430 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4830A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5000;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="430" height="240" fill="url(#bg)"/>

  <!-- 패턴 원들 -->
  <circle cx="380" cy="30" r="80" fill="#FFE082" fill-opacity="0.08"/>
  <circle cx="50" cy="210" r="100" fill="#FFE082" fill-opacity="0.06"/>
  <circle cx="215" cy="120" r="140" fill="#FFE082" fill-opacity="0.04"/>

  <!-- 가로줄 장식 -->
  <line x1="0" y1="200" x2="430" y2="200" stroke="#FFE082" stroke-opacity="0.15" stroke-width="1"/>

  <!-- 이모지 (텍스트 기반) -->
  <text x="215" y="130" font-size="80" text-anchor="middle" dominant-baseline="middle"
        filter="url(#shadow)">🍗</text>

  <!-- 가게명 배경 -->
  <rect x="0" y="195" width="430" height="45" fill="rgba(0,0,0,0.35)"/>

  <!-- 가게명 -->
  <text x="215" y="222" font-size="18" font-weight="700" text-anchor="middle"
        fill="white" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
        letter-spacing="1">바삭치킨</text>
</svg>
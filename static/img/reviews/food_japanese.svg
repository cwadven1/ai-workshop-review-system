  <!-- 새우 네타 -->
  <ellipse cx="295" cy="126" rx="28" ry="9" fill="#FF7043"/>
  <path d="M270 125 Q285 118 295 122 Q305 118 320 125" fill="none" stroke="#FF8A65" stroke-width="2"/>

  <!-- 와사비 (초록 방울) -->
  <ellipse cx="155" cy="195" rx="12" ry="8" fill="#43A047"/>
  <ellipse cx="155" cy="192" rx="10" ry="6" fill="#66BB6A"/>

  <!-- 생강 (핑크) -->
  <path d="M235 185 Q250 180 260 190 Q255 200 240 200 Q228 198 228 190Z" fill="#FFB3BA"/>
  <path d="M238 183 Q252 178 258 188" fill="none" stroke="#FF8A9A" stroke-width="1"/>

  <!-- 간장 작은 접시 -->
  <ellipse cx="345" cy="240" rx="30" ry="8" fill="#00000010"/>
  <ellipse cx="345" cy="235" rx="30" ry="8" fill="#E0C9A0"/>
  <ellipse cx="345" cy="230" rx="27" ry="7" fill="#5D4037"/>
  <ellipse cx="345" cy="228" rx="22" ry="5" fill="#3E2723"/>

  <!-- 젓가락 받침 -->
  <rect x="32" y="252" width="55" height="8" rx="4" fill="#D4A853"/>
  <!-- 젓가락 -->
  <rect x="38" y="220" width="3" height="60" rx="1.5" fill="#8B6914" transform="rotate(5 38 220)"/>
  <rect x="46" y="220" width="3" height="60" rx="1.5" fill="#8B6914" transform="rotate(5 46 220)"/>

  <!-- 라벨 -->
  <rect x="10" y="10" width="80" height="28" rx="14" fill="#C62828"/>
  <text x="50" y="29" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">오마카세</text>

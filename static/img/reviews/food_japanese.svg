<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#F8F0E8"/>
  <defs>
    <linearGradient id="plateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
  </defs>

  <!-- 접시 그림자 -->
  <ellipse cx="202" cy="245" rx="155" ry="18" fill="#00000018"/>
  <!-- 접시 -->
  <ellipse cx="200" cy="230" rx="155" ry="18" fill="#D0D0D0"/>
  <ellipse cx="200" cy="220" rx="155" ry="18" fill="url(#plateGrad)"/>
  <rect x="45" y="160" width="310" height="60" rx="10" fill="#FAFAFA"/>
  <ellipse cx="200" cy="160" rx="155" ry="18" fill="#F5F5F5"/>

  <!-- 초밥 1 (참치) -->
  <ellipse cx="105" cy="158" rx="32" ry="10" fill="#D0C8A0"/>
  <rect x="73" y="130" width="64" height="28" rx="6" fill="#F5F0DC"/>

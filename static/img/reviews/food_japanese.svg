  <ellipse cx="200" cy="158" rx="32" ry="10" fill="#D0C8A0"/>
  <rect x="168" y="130" width="64" height="28" rx="6" fill="#F5F0DC"/>
  <ellipse cx="200" cy="130" rx="32" ry="10" fill="#E8C87A"/>
  <!-- 연어 네타 -->
  <ellipse cx="200" cy="126" rx="28" ry="9" fill="#FF8C42"/>
  <ellipse cx="200" cy="124" rx="25" ry="7" fill="#FFA563"/>
  <!-- 연어 줄무늬 -->
  <line x1="182" y1="122" x2="188" y2="128" stroke="#FF6B1A" stroke-width="1.5" opacity="0.6"/>
  <line x1="195" y1="120" x2="201" y2="126" stroke="#FF6B1A" stroke-width="1.5" opacity="0.6"/>
  <line x1="208" y1="122" x2="214" y2="128" stroke="#FF6B1A" stroke-width="1.5" opacity="0.6"/>

  <!-- 초밥 3 (새우) -->
  <ellipse cx="295" cy="158" rx="32" ry="10" fill="#D0C8A0"/>
  <rect x="263" y="130" width="64" height="28" rx="6" fill="#F5F0DC"/>

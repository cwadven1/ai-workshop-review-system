{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}요기요 리뷰 분석{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 상단 네비게이션 바 -->
    <nav class="yg-navbar" aria-label="메인 네비게이션">
        <a class="yg-navbar-brand" href="/">
            요기요 리뷰 분석
        </a>
        <a href="/" class="yg-navbar-icon" aria-label="검색">
            <i class="bi bi-search"></i>
        </a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- 하단 탭 바 -->
    <nav class="bottom-tab-bar" aria-label="메인 메뉴">
        <a href="/" class="tab-item" id="tab-home">
            <i class="bi bi-house-fill"></i>
            <span>홈</span>
        </a>
        <a href="/" class="tab-item" id="tab-search">
            <i class="bi bi-search"></i>
            <span>검색</span>
        </a>
        <button class="tab-item" type="button" onclick="alert('준비 중입니다.')">
            <i class="bi bi-heart"></i>
            <span>찜</span>
        </button>
        <button class="tab-item" type="button" onclick="alert('준비 중입니다.')">
            <i class="bi bi-person"></i>
            <span>MY</span>
        </button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/chart-config.js' %}"></script>
    <script>
    // 하단 탭 바 활성 탭 설정
    (function () {
        const path = window.location.pathname;
        const params = new URLSearchParams(window.location.search);
        const hasFilter = params.has('q') || params.has('category') || params.has('trend');
        const tabHome = document.getElementById('tab-home');
        const tabSearch = document.getElementById('tab-search');

        if (path === '/' && !hasFilter) {
            tabHome && tabHome.classList.add('active');
        } else {
            tabSearch && tabSearch.classList.add('active');
        }
    })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
